<header>
  <div class="container pr-0">
    <div class="d-flex flex-row justify-content-end">

<!--        <ds-themed-search-navbar></ds-themed-search-navbar>-->
        <div class="social d-flex justify-content-center align-items-center mr-3">
          <a href="https://www.facebook.com/pedagogicoarcoiris" class="mx-1 text-white">

            <i class="fab fa-youtube"></i>

          </a>
