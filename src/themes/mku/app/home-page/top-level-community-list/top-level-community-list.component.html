<div class="row">
  <div class="col-md-6">
    <ng-container *ngVar="(communitiesRD$ | async) as communitiesRD">

      <div *ngIf="communitiesRD?.hasSucceeded" id="top-level-communities">
        <h5 class="font-weight-bold">Browse Content Collections</h5>
        <p class="lead">{{'home.top-level-communities.help' | translate}}</p>
        <ds-viewable-collection
          [config]="config" [hasBorder]="true"
          [sortConfig]="sortConfig"
          [objects]="communitiesRD$ | async"
          [hidePaginationDetail]="true"
          [hideGear]="true">
        </ds-viewable-collection>
      </div>
      <ds-error *ngIf="communitiesRD?.hasFailed " message="{{'error.top-level-communites' | translate}}"></ds-error>
      <ds-themed-loading *ngIf="communitiesRD?.isLoading " message="{{'loading.top-level-communities' | translate}}"></ds-themed-loading></ng-container>

  </div>
  <div class="col-md-6 text-center">
    <ng-container *ngIf="haveCommunities">
      <h5 class="px-4 text-center mb-2 font-weight-bold">Knowledge Wheel</h5>
      <div class="text-center">
        <figure class="highcharts-figure">
          <highcharts-chart
            [Highcharts]="Highcharts"
            [options]="chartOptions" [title]="'my title'"
            [(update)]="updateFlag" *ngIf="isHighcharts" [callbackFunction]="chartCallback"
            style="width: 100%; height: 400px; display: block;"
          ></highcharts-chart>
        </figure>
      </div>
    </ng-container>
    <ng-container *ngIf="!haveCommunities">
      Loading Knowledge Wheel ...
    </ng-container>
  </div>
</div>
