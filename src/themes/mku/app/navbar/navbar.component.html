
<nav [ngClass]="{'open': !(menuCollapsed | async)}"
     [@slideMobileNav]="!(windowService.isXsOrSm() | async) ? 'default' : ((menuCollapsed | async) ? 'collapsed' : 'expanded')"
     class="navbar navbar-light navbar-expand-md p-md-0 navbar-container bg-light"
     role="navigation" [attr.aria-label]="'nav.main.description' | translate">
  <div class="container">
    <div id="nonCollapsingNav" class="d-flex">
      <h4 class="d-flex navbar-title">Institutional Repository</h4>
    </div>
    <!-- TODO remove navbar-container class when https://github.com/twbs/bootstrap/issues/24726 is fixed -->
    <div class="navbar-inner-container w-100 justify-content-end" [class.container]="!(isXsOrSm$ | async)">
      <div class="reset-padding-md">
        <div id="collapsingNav">
          <ul class="navbar-nav navbar-navigation">
            <li class="nav-item nav-link">
              <a routerLink="/communities/fb7920b9-e417-4ec9-94e2-bc72a7a64513">Scholars</a></li>
            <li *ngIf="(isXsOrSm$ | async) && (isAuthenticated$ | async)">
              <ds-user-menu [inExpandableNavbar]="true"></ds-user-menu>
            </li>
            <ng-container *ngFor="let section of (sections | async)">
              <ng-container *ngComponentOutlet="(sectionMap$ | async).get(section.id)?.component; injector: (sectionMap$ | async).get(section.id)?.injector;"></ng-container>
            </ng-container>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
